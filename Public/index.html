<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Player Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Rock Paper Scissors</h1>

    <h2 id="player-info">Waiting for player...</h2>

    <div class="room-controls">
        <button id="create-room">Create Room</button>
        <input type="text" id="room-input" placeholder="Enter Room Code">
        <button id="join-room">Join Room</button>
    </div>

    <div class="choices">
        <div class="choice" id="rock">
            <img src="Images/Rock.jpg">
        </div>
        <div class="choice" id="paper">
            <img src="Images/Paper.jpg">
        </div>
        <div class="choice" id="scissors">
            <img src="Images/Scissor.jpg">
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="player1-score">0</p>
            <p>Player 1</p>
        </div>
        <div class="score">
            <p id="player2-score">0</p>
            <p>Player 2</p>
        </div>
    </div>

    <div class="msg-container">
        <p id="msg">Create or Join a Room</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script src="app.js"></script>

</body>
</html>
